<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Report Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EFE9;--border:#E3E1D9;--border2:#CFCDC4;
  --ink:#18180F;--ink2:#5C5B52;--ink3:#9C9B92;
  --blue:#1565C0;--blue-bg:#EEF4FF;
  --r:10px;--sans:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}

/* HEADER */
.header{background:var(--ink);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.header-name{font-size:14px;font-weight:600;color:#fff}
.header-sub{font-size:11px;color:#888;margin-left:4px}
.header-actions{display:flex;gap:8px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:#aaa;border:1px solid #333}
.btn-ghost:hover{border-color:#666;color:#fff}
.btn-primary{background:#fff;color:var(--ink)}
.btn-primary:hover{background:#eee}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#1255a8}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:transparent;color:#C62828;border:1px solid #FFCDD2;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-danger:hover{background:#FFEBEE}

/* LAYOUT */
.page{max-width:1100px;margin:0 auto;padding:28px 20px 60px;display:flex;flex-direction:column;gap:20px}

/* SECTION */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-size:13px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-pad{padding:20px 24px}
.divider{height:1px;background:var(--border)}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3)}
.field input,.field select{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--bg);outline:none;transition:border-color .15s,background .15s;width:100%}
.field input:focus,.field select:focus{border-color:var(--blue);background:#fff}

/* TABLE */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.adset-table{width:100%;border-collapse:collapse;min-width:780px}
.adset-table thead tr{border-bottom:1px solid var(--border)}
.adset-table thead th{padding:10px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);background:var(--surface2);text-align:center;white-space:nowrap}
.adset-table thead th:first-child{text-align:left;padding-left:16px}
.adset-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.adset-table tbody tr:last-child{border-bottom:none}
.adset-table tbody tr:hover{background:var(--bg)}
.adset-table td{padding:6px;vertical-align:middle}
.adset-table td:first-child{padding-left:16px}
.tbl-input{width:100%;padding:7px 8px;border:1.5px solid transparent;border-radius:6px;font-family:var(--mono);font-size:12px;color:var(--ink);background:transparent;outline:none;transition:all .15s;text-align:center}
.tbl-input.name{text-align:left;font-family:var(--sans);font-size:13px}
.tbl-input:focus{border-color:var(--blue);background:#fff}
.tbl-input::placeholder{color:var(--ink3)}
.row-idx{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--ink3);flex-shrink:0}
.td-name-wrap{display:flex;align-items:center;gap:8px;min-width:180px}
.total-row{background:var(--surface2)!important}
.total-row td{padding:10px 6px;font-family:var(--mono);font-size:12px;font-weight:500;text-align:center;color:var(--ink);border-top:1.5px solid var(--border2)}
.total-row td:first-child{padding-left:16px;font-family:var(--sans);font-size:13px;font-weight:600;text-align:left}
.add-row{width:100%;padding:12px;background:none;border:none;border-top:1px solid var(--border);font-family:var(--sans);font-size:13px;color:var(--ink3);cursor:pointer;transition:color .15s,background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-row:hover{color:var(--blue);background:var(--blue-bg)}

/* NOTES */
.note-item{display:flex;gap:10px;align-items:flex-start}
.note-num{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:10px;flex-shrink:0;width:18px}
.note-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--bg);outline:none;transition:all .15s}
.note-input:focus{border-color:var(--blue);background:#fff}
.notes-list{display:flex;flex-direction:column;gap:10px}

/* PREVIEW */
#previewSection{display:none}
.preview-wrap{padding:24px;background:var(--surface2)}
.pdf-page{max-width:740px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:10px;padding:44px 48px;box-shadow:0 8px 40px rgba(0,0,0,.08);font-family:var(--sans)}

/* PDF STYLES */
.pdf-top{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:16px;border-bottom:2px solid var(--ink);margin-bottom:28px}
.pdf-brand{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.pdf-title{font-size:24px;font-weight:700;margin-top:4px}
.pdf-meta-r{text-align:right;font-size:11px;color:var(--ink2);line-height:1.8}
.pdf-sec{margin-bottom:26px}
.pdf-sec-lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:10px}
.pdf-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E3E1D9;border-radius:8px;overflow:hidden}
.pdf-kpi{background:#fff;padding:14px 16px}
.pdf-kpi:nth-child(even){background:#FAFAF8}
.pdf-kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#9C9B92}
.pdf-kpi-val{font-family:var(--mono);font-size:18px;font-weight:500;margin:4px 0 2px}
.pdf-kpi-sub{font-size:9px;color:#B0AFA6}
.pdf-tbl{width:100%;border-collapse:collapse}
.pdf-tbl thead th{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#9C9B92;padding:8px 10px;background:#F7F6F2;border-bottom:1px solid #E3E1D9}
.pdf-tbl thead th:not(:first-child){text-align:right}
.pdf-tbl tbody td{padding:9px 10px;font-size:11px;border-bottom:1px solid #F0EFE9}
.pdf-tbl tbody td:not(:first-child){text-align:right;font-family:var(--mono);font-size:10.5px}
.pdf-tbl tfoot td{padding:9px 10px;font-size:11px;font-weight:600;border-top:1.5px solid #18180F}
.pdf-tbl tfoot td:not(:first-child){text-align:right;font-family:var(--mono);font-size:10.5px}
.pdf-notes-list{display:flex;flex-direction:column;gap:7px}
.pdf-note{display:flex;gap:9px;font-size:11px;line-height:1.6;color:#3a3a3a}
.pdf-note-n{font-family:var(--mono);font-size:9px;color:#B0AFA6;padding-top:2px;flex-shrink:0}
.pdf-footer{margin-top:28px;padding-top:12px;border-top:1px solid #E3E1D9;display:flex;justify-content:space-between;font-size:9px;color:#B0AFA6}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){
  .header-sub{display:none}
  .btn-ghost{display:none}
  .header{padding:0 16px}
  .page{padding:20px 14px 60px}
  .card-pad{padding:16px}
  .pdf-page{padding:28px 20px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">M</div>
    <span class="header-name">Ads Report</span>
    <span class="header-sub">Generator</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="resetForm()">Reset</button>
    <button class="btn btn-primary btn-sm" onclick="generatePreview()">&#9654; Preview</button>
    <button class="btn btn-blue btn-sm" onclick="downloadPDF()">&#8595; Export PDF</button>
  </div>
</header>

<div class="page">

  <!-- Campaign Info -->
  <div class="card">
    <div class="card-pad">
      <div class="section-head">
        <span class="section-title">Campaign Information</span>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Account / Client Name</label>
          <input type="text" id="clientName" placeholder="e.g. ADSUMO – Bimbel GA" value="ADSUMO – Bimbel GA H...">
        </div>
        <div class="field">
          <label>Campaign Name</label>
          <input type="text" id="campaignName" placeholder="e.g. New Sales Campaign" value="New Sales Campaign">
        </div>
        <div class="field">
          <label>Campaign Objective</label>
          <select id="objective">
            <option>Messaging Conversations</option>
            <option>Leads</option>
            <option>Traffic</option>
            <option>Awareness</option>
            <option>Conversions</option>
          </select>
        </div>
        <div class="field">
          <label>Start Date</label>
          <input type="date" id="dateStart" value="2026-05-20">
        </div>
        <div class="field">
          <label>End Date</label>
          <input type="date" id="dateEnd" value="2026-05-27">
        </div>
        <div class="field">
          <label>Currency</label>
          <select id="currency">
            <option value="Rp">IDR (Rp)</option>
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Ad Sets -->
  <div class="card">
    <div class="card-pad" style="padding-bottom:14px">
      <div class="section-head" style="margin-bottom:0">
        <span class="section-title">Ad Set Data</span>
        <span style="font-size:12px;color:var(--ink3)">Scroll right on mobile →</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="table-scroll">
      <table class="adset-table" id="adsetTable">
        <thead>
          <tr>
            <th style="min-width:200px;text-align:left">Ad Set Name</th>
            <th style="min-width:80px">Results</th>
            <th style="min-width:90px">Reach</th>
            <th style="min-width:75px">Frequency</th>
            <th style="min-width:100px">Cost/Result</th>
            <th style="min-width:110px">Amount Spent</th>
            <th style="min-width:70px">CTR (%)</th>
            <th style="min-width:85px">CPC</th>
            <th style="min-width:85px">CPM</th>
            <th style="min-width:44px"></th>
          </tr>
        </thead>
        <tbody id="adsetBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td>Total / Average</td>
            <td id="s-res">—</td><td id="s-reach">—</td><td id="s-freq">—</td>
            <td id="s-cpr">—</td><td id="s-spend">—</td><td id="s-ctr">—</td>
            <td id="s-cpc">—</td><td id="s-cpm">—</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <button class="add-row" onclick="addRow()">+ Add Ad Set</button>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="card-pad">
      <div class="section-head">
        <span class="section-title">Notes &amp; Recommendations</span>
        <button class="btn btn-ghost btn-sm" style="color:var(--ink2);border-color:var(--border)" onclick="addNote()">+ Add Note</button>
      </div>
      <div class="notes-list" id="notesList"></div>
    </div>
  </div>

  <!-- Preview -->
  <div id="previewSection">
    <div class="card">
      <div class="card-pad" style="display:flex;justify-content:space-between;align-items:center;padding-bottom:16px">
        <span class="section-title">Report Preview</span>
        <button class="btn btn-blue btn-sm" onclick="downloadPDF()">&#8595;&nbsp;Download PDF</button>
      </div>
      <div class="divider"></div>
      <div class="preview-wrap">
        <div class="pdf-page" id="pdfContent"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let rowCount = 0, noteCount = 0;

const seed = [
  ["New Sales Ad Set – Copy (1)","39","29364","1.33","5435","211977","0.36","1514","5416"],
  ["New Sales Ad Set – Copy (2)","170","71641","1.63","4071","692071","0.39","1521","5945"],
  ["New Sales Ad Set",           "45","25662","1.32","4006","180271","0.38","1397","5328"],
];
const seedNotes = [
  "Ad Set Copy (2) generated 67% of total results. Consider scaling up its budget gradually.",
  "New Sales Ad Set has the lowest cost per result (Rp4,006). A good candidate for scale up.",
  "Average CTR of 0.38% is below the education industry benchmark (0.5–1.0%). Consider A/B testing new creatives.",
];

window.onload = () => {
  seed.forEach(r => addRow(r));
  seedNotes.forEach(n => addNote(n));
};

function addRow(d=[]) {
  rowCount++;
  const id = rowCount;
  const [name,res,reach,freq,cpr,spend,ctr,cpc,cpm] = d;
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  const fields = [
    {cls:'name',val:name||'',ph:'Ad Set Name',type:'text'},
    {val:res||'',ph:'0',type:'number'},
    {val:reach||'',ph:'0',type:'number'},
    {val:freq||'',ph:'0.00',type:'number',step:'0.01'},
    {val:cpr||'',ph:'0',type:'number'},
    {val:spend||'',ph:'0',type:'number'},
    {val:ctr||'',ph:'0.00',type:'number',step:'0.01'},
    {val:cpc||'',ph:'0',type:'number'},
    {val:cpm||'',ph:'0',type:'number'},
  ];
  const tds = fields.map((f,i) => {
    const inp = `<input class="tbl-input${f.cls?' '+f.cls:''}" type="${f.type}" placeholder="${f.ph}" value="${f.val||''}" ${f.step?`step="${f.step}"`:'min="0"'} oninput="calcTotals()">`;
    if(i===0) return `<td><div class="td-name-wrap"><div class="row-idx">${id}</div>${inp}</div></td>`;
    return `<td>${inp}</td>`;
  }).join('');
  tr.innerHTML = tds + `<td style="text-align:center"><button class="btn-danger" onclick="delRow(${id})">×</button></td>`;
  document.getElementById('adsetBody').appendChild(tr);
  calcTotals();
}

function delRow(id) {
  const el = document.getElementById(`row-${id}`);
  if(el){ el.remove(); calcTotals(); }
}

function addNote(txt='') {
  noteCount++;
  const id = noteCount;
  const div = document.createElement('div');
  div.className = 'note-item'; div.id = `note-${id}`;
  div.innerHTML = `<span class="note-num">${id}.</span>
    <input class="note-input" type="text" value="${txt}" placeholder="Write a note or recommendation...">
    <button class="btn-danger" onclick="document.getElementById('note-${id}').remove()">×</button>`;
  document.getElementById('notesList').appendChild(div);
}

function getRows() {
  return [...document.querySelectorAll('#adsetBody tr')].map(tr => {
    const inp = tr.querySelectorAll('input');
    return {name:inp[0].value.trim()||'—',res:+inp[1].value||0,reach:+inp[2].value||0,freq:+inp[3].value||0,cpr:+inp[4].value||0,spend:+inp[5].value||0,ctr:+inp[6].value||0,cpc:+inp[7].value||0,cpm:+inp[8].value||0};
  });
}

function getNotes() {
  return [...document.querySelectorAll('#notesList input')].map(i=>i.value.trim()).filter(Boolean);
}

function n(v,d=0){ return Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }

function calcTotals() {
  const rows = getRows(); if(!rows.length) return;
  const cur = document.getElementById('currency').value;
  const totRes=rows.reduce((s,r)=>s+r.res,0);
  const totReach=rows.reduce((s,r)=>s+r.reach,0);
  const totSpend=rows.reduce((s,r)=>s+r.spend,0);
  const avgFreq=rows.reduce((s,r)=>s+r.freq,0)/rows.length;
  const avgCPR=totRes?totSpend/totRes:0;
  const avgCTR=rows.reduce((s,r)=>s+r.ctr,0)/rows.length;
  const avgCPC=rows.reduce((s,r)=>s+r.cpc,0)/rows.length;
  const avgCPM=rows.reduce((s,r)=>s+r.cpm,0)/rows.length;
  document.getElementById('s-res').textContent=n(totRes);
  document.getElementById('s-reach').textContent=n(totReach);
  document.getElementById('s-freq').textContent=avgFreq.toFixed(2);
  document.getElementById('s-cpr').textContent=cur+n(Math.round(avgCPR));
  document.getElementById('s-spend').textContent=cur+n(Math.round(totSpend));
  document.getElementById('s-ctr').textContent=avgCTR.toFixed(2)+'%';
  document.getElementById('s-cpc').textContent=cur+n(Math.round(avgCPC));
  document.getElementById('s-cpm').textContent=cur+n(Math.round(avgCPM));
}

function generatePreview() {
  const rows=getRows(), notes=getNotes();
  const cur=document.getElementById('currency').value;
  const client=document.getElementById('clientName').value||'—';
  const campaign=document.getElementById('campaignName').value||'—';
  const obj=document.getElementById('objective').value;
  const ds=document.getElementById('dateStart').value;
  const de=document.getElementById('dateEnd').value;
  const fd=v=>v?new Date(v).toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'}):'—';
  const dateRange=ds&&de?fd(ds)+' – '+fd(de):'—';
  const today=new Date().toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'});
  const totRes=rows.reduce((s,r)=>s+r.res,0);
  const totReach=rows.reduce((s,r)=>s+r.reach,0);
  const totSpend=rows.reduce((s,r)=>s+r.spend,0);
  const avgFreq=rows.reduce((s,r)=>s+r.freq,0)/rows.length;
  const avgCPR=totRes?totSpend/totRes:0;
  const avgCTR=rows.reduce((s,r)=>s+r.ctr,0)/rows.length;
  const avgCPC=rows.reduce((s,r)=>s+r.cpc,0)/rows.length;
  const avgCPM=rows.reduce((s,r)=>s+r.cpm,0)/rows.length;

  const tblRows=rows.map(r=>`<tr>
    <td>${r.name}</td>
    <td>${n(r.res)}</td><td>${n(r.reach)}</td><td>${r.freq.toFixed(2)}</td>
    <td>${cur}${n(Math.round(r.cpr))}</td><td>${cur}${n(Math.round(r.spend))}</td>
    <td>${r.ctr.toFixed(2)}%</td><td>${cur}${n(Math.round(r.cpc))}</td><td>${cur}${n(Math.round(r.cpm))}</td>
  </tr>`).join('');

  const notesHTML=notes.map((t,i)=>`<div class="pdf-note"><span class="pdf-note-n">${i+1}.</span><span>${t}</span></div>`).join('');

  document.getElementById('pdfContent').innerHTML=`
    <div class="pdf-top">
      <div>
        <div class="pdf-brand">Meta Ads Report</div>
        <div class="pdf-title">${campaign}</div>
      </div>
      <div class="pdf-meta-r">${client}<br>${dateRange}<br>Generated: ${today}</div>
    </div>
    <div class="pdf-sec">
      <div class="pdf-sec-lbl">Performance Summary</div>
      <div class="pdf-kpis">
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Total Results</div><div class="pdf-kpi-val">${n(totRes)}</div><div class="pdf-kpi-sub">${obj}</div></div>
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Total Reach</div><div class="pdf-kpi-val">${n(totReach)}</div><div class="pdf-kpi-sub">Unique Accounts</div></div>
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Amount Spent</div><div class="pdf-kpi-val">${cur}${n(Math.round(totSpend))}</div><div class="pdf-kpi-sub">Total Budget Used</div></div>
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Cost per Result</div><div class="pdf-kpi-val">${cur}${n(Math.round(avgCPR))}</div><div class="pdf-kpi-sub">Average</div></div>
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Frequency</div><div class="pdf-kpi-val">${avgFreq.toFixed(2)}</div><div class="pdf-kpi-sub">Avg. per Account</div></div>
        <div class="pdf-kpi"><div class="pdf-kpi-lbl">Avg. CTR</div><div class="pdf-kpi-val">${avgCTR.toFixed(2)}%</div><div class="pdf-kpi-sub">Click-Through Rate</div></div>
      </div>
    </div>
    <div class="pdf-sec">
      <div class="pdf-sec-lbl">Ad Set Performance</div>
      <table class="pdf-tbl">
        <thead><tr>
          <th style="text-align:left">Ad Set</th>
          <th>Results</th><th>Reach</th><th>Freq.</th>
          <th>Cost/Result</th><th>Amt. Spent</th><th>CTR</th><th>CPC</th><th>CPM</th>
        </tr></thead>
        <tbody>${tblRows}</tbody>
        <tfoot><tr>
          <td>Total / Average</td>
          <td style="text-align:right">${n(totRes)}</td>
          <td style="text-align:right">${n(totReach)}</td>
          <td style="text-align:right">${avgFreq.toFixed(2)}</td>
          <td style="text-align:right">${cur}${n(Math.round(avgCPR))}</td>
          <td style="text-align:right">${cur}${n(Math.round(totSpend))}</td>
          <td style="text-align:right">${avgCTR.toFixed(2)}%</td>
          <td style="text-align:right">${cur}${n(Math.round(avgCPC))}</td>
          <td style="text-align:right">${cur}${n(Math.round(avgCPM))}</td>
        </tr></tfoot>
      </table>
    </div>
    ${notesHTML?`<div class="pdf-sec">
      <div class="pdf-sec-lbl">Notes &amp; Recommendations</div>
      <div class="pdf-notes-list">${notesHTML}</div>
    </div>`:''}
    <div class="pdf-footer">
      <span>${client} · Meta Ads Report</span>
      <span>Period: ${dateRange} · Confidential</span>
    </div>`;

  const sec=document.getElementById('previewSection');
  sec.style.display='block';
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),50);
  showToast('Preview ready!');
}

function downloadPDF() {
  const el=document.getElementById('pdfContent');
  if(!el||!el.innerHTML.trim()) generatePreview();
  const campaign=document.getElementById('campaignName').value||'Meta_Ads_Report';
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8"><title>${campaign}</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sora',sans-serif;font-size:12px;color:#18180F;padding:36px 40px;background:#fff}
    .pdf-top{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:14px;border-bottom:2px solid #18180F;margin-bottom:26px}
    .pdf-brand{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#9C9B92}
    .pdf-title{font-size:22px;font-weight:700;margin-top:3px}
    .pdf-meta-r{text-align:right;font-size:11px;color:#5C5B52;line-height:1.8}
    .pdf-sec{margin-bottom:24px}
    .pdf-sec-lbl{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#9C9B92;margin-bottom:10px}
    .pdf-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E3E1D9;border-radius:7px;overflow:hidden}
    .pdf-kpi{background:#fff;padding:12px 14px}.pdf-kpi:nth-child(even){background:#FAFAF8}
    .pdf-kpi-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#9C9B92}
    .pdf-kpi-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;margin:4px 0 2px}
    .pdf-kpi-sub{font-size:8px;color:#B0AFA6}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#9C9B92;padding:7px 9px;background:#F7F6F2;border-bottom:1px solid #E3E1D9}
    thead th:not(:first-child){text-align:right}
    tbody td{padding:8px 9px;font-size:10.5px;border-bottom:1px solid #F0EFE9}
    tbody td:not(:first-child){text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px}
    tfoot td{padding:8px 9px;font-size:10.5px;font-weight:600;border-top:1.5px solid #18180F}
    tfoot td:not(:first-child){text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px}
    .pdf-notes-list{display:flex;flex-direction:column;gap:6px}
    .pdf-note{display:flex;gap:8px;font-size:10.5px;line-height:1.6;color:#3a3a3a}
    .pdf-note-n{font-family:'JetBrains Mono',monospace;font-size:8px;color:#B0AFA6;padding-top:2px;flex-shrink:0}
    .pdf-footer{margin-top:24px;padding-top:10px;border-top:1px solid #E3E1D9;display:flex;justify-content:space-between;font-size:8px;color:#B0AFA6}
    @media print{body{padding:20px 24px}@page{margin:0;size:A4 portrait}}
    </style></head><body>${el.innerHTML}</body></html>`);
  win.document.close();
  win.onload=()=>setTimeout(()=>win.print(),300);
  showToast('Print dialog opened — choose "Save as PDF"');
}

function resetForm() {
  document.getElementById('adsetBody').innerHTML='';
  document.getElementById('notesList').innerHTML='';
  document.getElementById('previewSection').style.display='none';
  rowCount=0; noteCount=0;
  showToast('Form has been reset');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
